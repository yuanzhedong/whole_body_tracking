NAME: G1_MldVAE_v2_smallreg
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0]
DEBUG: false
SEED_VALUE: 42
FULL_CONFIG: true

# v2 changes vs v1:
#   - num_layers 9 -> 5, ff_size 1536 -> 1024, latent_dim [1,256] -> [1,128]
#     (reduces params 22.4M -> ~7M to fight overfitting on 12-clip dataset)
#   - LAMBDA_KL 1e-5 -> 5e-5 (stronger regularization)
#   - END_EPOCH 50000 -> 20000 (smaller model trains faster)
# Goal: improve val loss which diverged badly in v1 due to overfitting

TRAIN:
  STAGE: vae
  NUM_WORKERS: 4
  BATCH_SIZE: 64
  END_EPOCH: 5000
  RESUME: ''
  PRETRAINED: ''
  PRECISION: 32
  FORCE_BF16: false
  GRADIENT_CLIP_VAL: 1.0
  SPLIT: 'train'
  OPTIM:
    target: AdamW
    params:
      lr: 1e-4
      betas: [0.9, 0.99]
      weight_decay: 1e-4   # small weight decay for extra regularization
  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: 20000
      eta_min: 1e-6

EVAL:
  NUM_WORKERS: 4
  BATCH_SIZE: 64
  SPLIT: val

TEST:
  NUM_WORKERS: 4
  BATCH_SIZE: 64
  SPLIT: test
  SAVE_PREDICTIONS: false
  COUNT_TIME: false
  REPLICATION_TIMES: 1
  REP_I: 0

DATASET:
  target: multimodal_tokenizers.data.G1DataModule.G1DataModule
  motion_representation: g1_robot
  root_representation: velocity
  data_dir: /scratch/user/yzdong/OMG-Data/umt/g1_seed_p1_yup
  window_size: 128
  step_size: 32      # smaller step = more windows = less overfitting
  normalize_motion: true
  nfeats: 41
  DIST_SYNC_ON_STEP: true
  params:
    data_dir: /scratch/user/yzdong/OMG-Data/umt/g1_seed_p1_yup

Selected_part: full_biomechanics

model:
  target: multimodal_tokenizers.models.biomechanics_tokenizer.BioMechanicsTokenizer
  params:
    condition: null
    task: null
    motion_vae: null
    stage: ${TRAIN.STAGE}
    debug: ${DEBUG}
    codebook_size: null
    motion_codebook_size: null
    audio_codebook_size: null
    metrics_dict: ${METRIC.TYPE}
    tokenizer_arch:
      target: multimodal_tokenizers.archs.mld_vae.MldVaeBiomechanics
      params:
        vae_test_dim: 41
        latent_dim: [1, 128]   # smaller latent (less capacity -> regularized)
        ff_size: 1024          # smaller FF (was 1536)
        num_layers: 5          # shallower (was 9)
        num_heads: 8
        dropout: 0.15          # slightly more dropout
        arch: 'encoder_decoder'
        normalize_before: false
        activation: 'gelu'
        pe_type: 'actor'
        mlp_dist: false

MODEL:
  input_dim: 41
  latent_dim: 128
  vae_layer: 5

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.5
  LAMBDA_ACCELERATION: 0.0
  LAMBDA_ROOT_VELOCITY: 1.0
  LAMBDA_ROOT_ORIENT: 5.0
  LAMBDA_JERK: 0.0
  LAMBDA_KL: 5e-5            # stronger KL regularization (was 1e-5)
  LAMBDA_COMMIT: 0.0
  ABLATION:
    RECONS_LOSS: 'l1_smooth'

METRIC:
  TYPE: []
  DIST_SYNC_ON_STEP: true

LOGGER:
  TYPE: ['wandb']
  VAL_EVERY_STEPS: 1
  LOG_EVERY_N_STEPS: 10
  WANDB:
    target: pytorch_lightning.loggers.WandbLogger
    params:
      project: g1-motion-tokenizer
      offline: false
      id: null
      version: ''
      name: g1_mldvae_v2_smallreg
      save_dir: ${FOLDER_EXP}
      tags: ['mld_vae', 'g1_robot', 'v2', 'small', 'regularized', 'yup']

FOLDER_EXP: ./outputs/g1_seed_p1_vae
TIME: null
